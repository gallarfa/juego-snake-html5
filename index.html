<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Snake Pro</h1>
            <div class="score-board">
                <div class="score-box">
                    <span class="score-label">Puntaje</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Récord</span>
                    <span id="high-score" class="score-value">0</span>
                </div>
            </div>
        </header>

        <main class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">Listo para jugar</h2>
                <p id="overlay-desc">Usa las flechas del teclado o WASD para moverte.</p>
                <button id="start-btn" class="primary-btn">Comenzar</button>
            </div>
        </main>

        <footer class="game-footer">
            <p>Desarrollado con HTML, CSS y JavaScript</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
