<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Snake Pro</h1>
            <div class="score-board">
                <div class="score-box">
                    <span class="score-label">Puntaje</span>
                    <span id="score" class="score-value">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Dificultad</span>
                    <span id="difficulty-display" class="score-value" style="font-size: 0.9rem; line-height: 1.25rem;">Principiante</span>
                </div>
                <div class="score-box">
                    <span class="score-label">Récord</span>
                    <span id="high-score" class="score-value">0</span>
                </div>
            </div>
        </header>

        <main class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">Listo para jugar</h2>
                <div class="difficulty-selection">
                    <span class="difficulty-label">Seleccionar Dificultad:</span>
                    <div class="difficulty-buttons">
                        <button class="diff-btn active" data-level="easy">Principiante</button>
                        <button class="diff-btn" data-level="medium">Intermedio</button>
                        <button class="diff-btn" data-level="hard">Avanzado</button>
                    </div>
                </div>
                <p id="overlay-desc">Usa las flechas del teclado, WASD o desliza el dedo en celulares.</p>
                <button id="start-btn" class="primary-btn">Comenzar</button>
            </div>
        </main>

        <!-- Controles móviles virtuales -->
        <div class="mobile-controls">
            <button class="ctrl-btn btn-up" id="ctrl-up">▲</button>
            <button class="ctrl-btn btn-left" id="ctrl-left">◀</button>
            <button class="ctrl-btn btn-right" id="ctrl-right">▶</button>
            <button class="ctrl-btn btn-down" id="ctrl-down">▼</button>
        </div>

        <footer class="game-footer">
            <p>Desarrollado con HTML, CSS y JavaScript</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
